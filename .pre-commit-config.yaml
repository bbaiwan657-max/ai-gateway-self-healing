# Pre-commit configuration for security checks
repos:
  # Check for secrets and credentials
  - repo: https://github.com/secretlint/secretlint
    rev: v8.2.0
    hooks:
      - id: secretlint
        exclude: ^(\.env\.example|\.gitignore)$

  # Check for common security issues
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(package-lock.json|yarn.lock|\.env\.example)$

  # General Python checks
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=100']
